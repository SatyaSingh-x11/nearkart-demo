<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - NearKart</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-white via-purple-50 to-indigo-100 text-gray-800">

<!-- NAVBAR -->
<div class="fixed top-0 w-full bg-white/70 backdrop-blur border-b flex justify-between px-6 py-3 z-50">
  <h1 class="text-purple-600 font-bold">NearKart</h1>

  <div class="flex gap-4">
    <a href="explore.html">Explore</a>
    <a href="search.html">Search</a>
  </div>
</div>

<div class="pt-20 px-4 md:px-20 space-y-10">

  <!-- HERO -->
  <div class="relative rounded-2xl overflow-hidden shadow-lg">

    <img src="assets/shop1.jpg" class="w-full h-64 object-cover">

    <div class="absolute inset-0 bg-black/40"></div>

    <div class="absolute bottom-4 left-4 text-white">
      <h1 class="text-2xl font-bold">Ravi Medicals</h1>
      <p class="text-sm">Open Now • 0.5 km away</p>
    </div>

  </div>

  <!-- INFO -->
  <div class="glass p-4 rounded-2xl flex justify-between items-center">

    <div>
      <p class="font-semibold">Available Now</p>
      <p class="text-sm text-gray-500">Updated 2 mins ago</p>
    </div>

    <button class="bg-purple-600 text-white px-4 py-2 rounded-xl">
      Contact
    </button>

  </div>

  <!-- PRODUCTS -->
  <div>
    <h2 class="font-semibold mb-4">Products</h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

      <a href="product.html">
        <div class="bg-white rounded-xl shadow hover:scale-105 transition overflow-hidden">
          <img src="assets/product1.jpg" class="h-32 w-full object-cover">
          <div class="p-2 text-sm">Paracetamol</div>
        </div>
      </a>

      <a href="product.html">
        <div class="bg-white rounded-xl shadow hover:scale-105 transition overflow-hidden">
          <img src="assets/product2.jpg" class="h-32 w-full object-cover">
          <div class="p-2 text-sm">Crocin</div>
        </div>
      </a>

      <a href="product.html">
        <div class="bg-white rounded-xl shadow hover:scale-105 transition overflow-hidden">
          <img src="assets/product3.jpg" class="h-32 w-full object-cover">
          <div class="p-2 text-sm">Vicks</div>
        </div>
      </a>

      <a href="product.html">
        <div class="bg-white rounded-xl shadow hover:scale-105 transition overflow-hidden">
          <img src="assets/product4.jpg" class="h-32 w-full object-cover">
          <div class="p-2 text-sm">Dolo</div>
        </div>
      </a>

    </div>
  </div>

  <!-- REVIEWS -->
  <div>
    <h2 class="font-semibold mb-4">Customer Reviews</h2>

    <div class="space-y-3">

      <div class="glass p-3 rounded-xl">
        ⭐⭐⭐⭐⭐ Great service and fast response
      </div>

      <div class="glass p-3 rounded-xl">
        ⭐⭐⭐⭐ Products available most of the time
      </div>

    </div>
  </div>

  <!-- RELATED SHOPS -->
  <div>
    <h2 class="font-semibold mb-4">Nearby Shops</h2>

    <div class="flex gap-4 overflow-x-auto">

      <img src="assets/shop2.jpg" class="w-40 h-32 rounded-xl object-cover">
      <img src="assets/shop3.jpg" class="w-40 h-32 rounded-xl object-cover">
      <img src="assets/shop4.jpg" class="w-40 h-32 rounded-xl object-cover">

    </div>
  </div>

</div>

</body>
</html>
