<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore - NearKart</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
    }

    .fade-up {
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body class="bg-gradient-to-br from-white via-purple-50 to-indigo-100 text-gray-800">

<!-- NAVBAR -->
<div class="fixed top-0 w-full bg-white/70 backdrop-blur border-b flex justify-between px-6 py-3 z-50">
  <h1 class="text-purple-600 font-bold">NearKart</h1>

  <div class="flex gap-4">
    <a href="index.html">Home</a>
    <a href="search.html">Search</a>
  </div>
</div>

<div class="pt-20 px-4 md:px-20 space-y-10">

  <!-- 🔥 TRENDING (AUTO SCROLL) -->
  <div>
    <h2 class="font-semibold mb-3">🔥 Trending Near You</h2>

    <div class="flex gap-4 overflow-x-auto scroll-smooth">

      <div class="min-w-[150px] bg-white p-3 rounded-xl shadow">Milk</div>
      <div class="min-w-[150px] bg-white p-3 rounded-xl shadow">Paracetamol</div>
      <div class="min-w-[150px] bg-white p-3 rounded-xl shadow">Snacks</div>
      <div class="min-w-[150px] bg-white p-3 rounded-xl shadow">Notebook</div>

    </div>
  </div>

  <!-- 🏪 SHOP CARDS -->
  <div>
    <h2 class="font-semibold mb-3">Nearby Shops</h2>

    <div id="shopContainer" class="grid md:grid-cols-2 gap-6">

      <!-- CARD -->
      <div class="relative rounded-2xl overflow-hidden shadow-lg fade-up">

        <img src="assets/shop1.jpg" class="w-full h-56 object-cover">

        <div class="absolute inset-0 bg-black/40"></div>

        <div class="absolute bottom-4 left-4 text-white">
          <h3 class="text-lg font-bold">Ravi Medicals</h3>
          <p class="text-sm">Available • 0.5 km</p>
        </div>

      </div>

      <!-- CARD -->
      <div class="relative rounded-2xl overflow-hidden shadow-lg fade-up">

        <img src="assets/shop2.jpg" class="w-full h-56 object-cover">

        <div class="absolute inset-0 bg-black/40"></div>

        <div class="absolute bottom-4 left-4 text-white">
          <h3 class="text-lg font-bold">City Store</h3>
          <p class="text-sm">Available • 1.2 km</p>
        </div>

      </div>

    </div>
  </div>

  <!-- 📦 PRODUCTS SLIDER -->
  <div>
    <h2 class="font-semibold mb-3">Popular Products</h2>

    <div class="flex gap-4 overflow-x-auto">

      <img src="assets/product1.jpg" class="w-32 h-32 rounded-xl object-cover shadow">
      <img src="assets/product2.jpg" class="w-32 h-32 rounded-xl object-cover shadow">
      <img src="assets/product3.jpg" class="w-32 h-32 rounded-xl object-cover shadow">
      <img src="assets/product4.jpg" class="w-32 h-32 rounded-xl object-cover shadow">

    </div>
  </div>

  <!-- 🧠 AI SUGGESTIONS -->
  <div class="glass p-4 rounded-2xl">
    <h3 class="text-sm text-gray-500 mb-2">AI Suggestions</h3>

    <div class="flex flex-wrap gap-2">
      <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm">Open medical stores</span>
      <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm">Cheap groceries</span>
      <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm">Nearby snacks</span>
    </div>
  </div>

  <!-- 🔁 LOAD MORE -->
  <div class="text-center">
    <button onclick="loadMore()" class="bg-purple-600 text-white px-6 py-3 rounded-xl shadow hover:scale-105 transition">
      Load More
    </button>
  </div>

</div>

<script>
function loadMore() {
  const container = document.getElementById("shopContainer");

  for(let i=0; i<4; i++) {
    const div = document.createElement("div");

    div.className = "relative rounded-2xl overflow-hidden shadow-lg fade-up";

    div.innerHTML = `
      <img src="assets/shop${Math.floor(Math.random()*5)+1}.jpg" class="w-full h-56 object-cover">
      <div class="absolute inset-0 bg-black/40"></div>
      <div class="absolute bottom-4 left-4 text-white">
        <h3 class="text-lg font-bold">New Shop</h3>
        <p class="text-sm">Available • 1 km</p>
      </div>
    `;

    container.appendChild(div);
  }
}
</script>

</body>
</html>
