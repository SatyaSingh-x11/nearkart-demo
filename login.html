<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NearKart</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-white via-purple-50 to-indigo-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md space-y-4">

  <h1 class="text-2xl font-bold text-center text-purple-600">NearKart</h1>

  <input placeholder="Email"
    class="w-full p-3 border rounded-xl outline-none">

  <input placeholder="Password" type="password"
    class="w-full p-3 border rounded-xl outline-none">

  <button onclick="login()"
    class="w-full bg-purple-600 text-white py-3 rounded-xl hover:scale-105 transition">
    Login
  </button>

  <p class="text-center text-sm text-gray-500">
    Don't have an account? Sign up
  </p>

</div>

<script>
function login() {
  localStorage.setItem("user", "logged");
  window.location.href = "profile.html";
}
</script>

</body>
</html>
