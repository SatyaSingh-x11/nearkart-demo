<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - NearKart</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-white via-purple-50 to-indigo-100 text-gray-800">

<!-- NAVBAR -->
<div class="fixed top-0 w-full bg-white/70 backdrop-blur border-b flex justify-between px-6 py-3 z-50">
  <h1 class="text-purple-600 font-bold">NearKart</h1>

  <div class="flex gap-4">
    <a href="explore.html">Explore</a>
    <a href="shop.html">Shop</a>
  </div>
</div>

<div class="pt-20 px-4 md:px-20 space-y-10">

  <!-- HERO IMAGE -->
  <div class="rounded-2xl overflow-hidden shadow-lg">
    <img src="assets/product1.jpg" class="w-full h-64 object-cover">
  </div>

  <!-- DETAILS -->
  <div class="glass p-6 rounded-2xl space-y-2">
    <h1 class="text-2xl font-bold">Paracetamol</h1>
    <p class="text-purple-600 font-semibold">₹20</p>
    <p class="text-sm text-gray-500">Available in nearby shops</p>
  </div>

  <!-- AVAILABLE SHOPS -->
  <div>
    <h2 class="font-semibold mb-3">Available At</h2>

    <div class="space-y-3">

      <div class="glass p-4 rounded-xl flex justify-between items-center">
        <div>
          <p class="font-semibold">Ravi Medicals</p>
          <p class="text-sm text-gray-500">0.5 km away</p>
        </div>
        <button class="bg-purple-600 text-white px-3 py-1 rounded-lg">
          Contact
        </button>
      </div>

      <div class="glass p-4 rounded-xl flex justify-between items-center">
        <div>
          <p class="font-semibold">City Store</p>
          <p class="text-sm text-gray-500">1.2 km away</p>
        </div>
        <button class="bg-purple-600 text-white px-3 py-1 rounded-lg">
          Contact
        </button>
      </div>

    </div>
  </div>

  <!-- REVIEWS -->
  <div>
    <h2 class="font-semibold mb-3">Reviews</h2>

    <div class="space-y-2">
      <div class="glass p-3 rounded-xl">⭐⭐⭐⭐⭐ Very useful</div>
      <div class="glass p-3 rounded-xl">⭐⭐⭐⭐ Good availability</div>
    </div>
  </div>

  <!-- RELATED PRODUCTS -->
  <div>
    <h2 class="font-semibold mb-3">Related Products</h2>

    <div class="flex gap-4 overflow-x-auto">

      <a href="product.html">
        <img src="assets/product2.jpg" class="w-32 h-32 rounded-xl object-cover shadow">
      </a>

      <a href="product.html">
        <img src="assets/product3.jpg" class="w-32 h-32 rounded-xl object-cover shadow">
      </a>

      <a href="product.html">
        <img src="assets/product4.jpg" class="w-32 h-32 rounded-xl object-cover shadow">
      </a>

    </div>
  </div>

  <!-- PEOPLE ALSO SEARCHED -->
  <div class="glass p-4 rounded-2xl">
    <h3 class="text-sm text-gray-500 mb-2">People also searched</h3>

    <div class="flex flex-wrap gap-2">
      <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm">Fever medicine</span>
      <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm">Cold tablets</span>
      <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-sm">Nearby pharmacy</span>
    </div>
  </div>

</div>

</body>
</html>
